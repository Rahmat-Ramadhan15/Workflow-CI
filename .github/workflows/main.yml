name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "data_automate_processing.csv"
  TARGET_VAR: "Churn"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Run mlflow project
        run: |
          mlflow run . --env-manager=local

      - name: Run MLflow Project and Capture RUN_ID
        id: run_mlflow
        run: |
          echo "Menjalankan MLflow Project..."
          output=$(mlflow run . --env-manager=local --experiment-name "Telco-Customer-Churn-Tuning")
          echo "$output"
      
          RUN_ID=$(echo "$output" | grep -oP "Run \(ID '\K[^']+")
          if [ -z "$RUN_ID" ]; then
            echo "Gagal menangkap RUN_ID!"
            exit 1
          fi
      
          echo "RUN_ID didapat: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Debug - Show model artifact path (optional)
        run: |
          echo "Checking if model exists at mlruns/0/$RUN_ID/artifacts/"
          ls -R mlruns/0/$RUN_ID/artifacts/

      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "tcc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag tcc ${{ secrets.DOCKER_HUB_USERNAME }}/tcc:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/tcc:latest
